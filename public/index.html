<html>

<head>
    <title>School Locator</title>

<body>

    <div id="sidebar">

        ```
        <!-- 🔎 FILTERS -->
        <div class="section">
            <h3>Filters</h3>

            <select id="radiusFilter" onchange="loadSchools()">
                <option value="all">All Distances</option>
                <option value="5">Within 5 km</option>
                <option value="10">Within 10 km</option>
                <option value="20">Within 20 km</option>
            </select>

            <input id="searchInput" placeholder="Search school..." oninput="loadSchools()" />
        </div>

        <!-- 📍 LIST -->
        <div class="section">
            <h2>Nearby Schools</h2>
            <div id="schoolList">Loading...</div>
        </div>

        <!-- ➕ FORM -->
        <div class="section">
            <h3>Add School</h3>

            <input id="name" placeholder="School Name" />
            <input id="address" placeholder="Address" />
            <input id="latitude" placeholder="Latitude" />
            <input id="longitude" placeholder="Longitude" />

            <button class="location" onclick="useMyLocation()">📍 Use My Location</button>
            <button class="save" onclick="addSchool()">💾 Save</button>
        </div>
        ```

    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        const BASE_URL = "https://school-i03o.onrender.com";

        const map = L.map('map').setView([18.52, 73.85], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const redIcon = L.icon({
            iconUrl: "https://maps.google.com/mapfiles/ms/icons/red-dot.png",
            iconSize: [32, 32]
        });

        const greenIcon = L.icon({
            iconUrl: "https://maps.google.com/mapfiles/ms/icons/green-dot.png",
            iconSize: [32, 32]
        });

        let userLat, userLon;
        let markers = [];
        let radiusCircle;

        async function loadSchools() {

            const list = document.getElementById("schoolList");
            list.innerHTML = "Loading...";

            const res = await fetch(`${BASE_URL}/api/listSchools?latitude=${userLat}&longitude=${userLon}`);
            const schools = await res.json();

            const radius = document.getElementById("radiusFilter").value;
            const search = document.getElementById("searchInput").value.toLowerCase();

            const filtered = schools.filter(s => {
                const r = radius === "all" || s.distance <= radius;
                const m = s.name.toLowerCase().includes(search) || s.address.toLowerCase().includes(search);
                return r && m;
            });

            list.innerHTML = "";

            if (filtered.length === 0) {
                list.innerHTML = "No schools found";
                return;
            }

            markers.forEach(m => map.removeLayer(m));
            markers = [];

            filtered.forEach((school, i) => {
                const icon = i === 0 ? greenIcon : redIcon;

                const marker = L.marker([school.latitude, school.longitude], { icon })
                    .addTo(map)
                    .bindPopup(`<b>${school.name}</b><br>${school.distance.toFixed(2)} km`);

                markers.push(marker);

                const div = document.createElement("div");
                div.className = "school-item";
                if (i === 0) div.classList.add("nearest");

                div.innerHTML = `
                <b>${school.name}</b><br>
                ${school.address}<br>
                ${school.distance.toFixed(2)} km
            `;

                div.onclick = () => {
                    map.setView([school.latitude, school.longitude], 15);
                    marker.openPopup();
                };

                list.appendChild(div);
            });

            // 🔵 Draw radius circle
            if (radiusCircle) map.removeLayer(radiusCircle);

            if (radius !== "all") {
                radiusCircle = L.circle([userLat, userLon], {
                    radius: radius * 1000,
                    color: 'blue',
                    fillOpacity: 0.1
                }).addTo(map);
            }
        }

        function useMyLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                document.getElementById("latitude").value = pos.coords.latitude;
                document.getElementById("longitude").value = pos.coords.longitude;
            });
        }

        async function addSchool() {
            const name = document.getElementById("name").value;
            const address = document.getElementById("address").value;
            const latitude = document.getElementById("latitude").value;
            const longitude = document.getElementById("longitude").value;

            if (!name || !address || !latitude || !longitude) {
                alert("Fill all fields");
                return;
            }

            await fetch(`${BASE_URL}/api/addSchool`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, address, latitude, longitude })
            });

            alert("School added!");

            document.getElementById("name").value = "";
            document.getElementById("address").value = "";
            document.getElementById("latitude").value = "";
            document.getElementById("longitude").value = "";

            loadSchools();
        }

        navigator.geolocation.getCurrentPosition(pos => {
            userLat = pos.coords.latitude;
            userLon = pos.coords.longitude;

            map.setView([userLat, userLon], 14);

            L.marker([userLat, userLon])
                .addTo(map)
                .bindPopup("📍 You are here")
                .openPopup();

            loadSchools();
        });
    </script>

</body>

</html>
